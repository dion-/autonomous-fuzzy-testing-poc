name: App Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - "auto-fix/**"

env:
  BOMBADIL_TIME_LIMIT: ${{ vars.BOMBADIL_TIME_LIMIT || '2m' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        run: pnpm run lint:ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc)
        run: pnpm run typecheck

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:coverage

  bombadil:
    name: Bombadil Fuzzy Test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Start preview server
        run: |
          pnpm exec vite preview --port 4173 --host &
          npx wait-on http://localhost:4173

      - name: Install Chromium
        run: |
          npx -y playwright install chromium
          CHROME_PATH="$(find ~/.cache/ms-playwright -name chrome -type f | head -1)"
          sudo ln -sf "$CHROME_PATH" /usr/bin/google-chrome-stable
          echo "Using Chromium at $CHROME_PATH"
        shell: bash

      - name: Run Bombadil
        run: |
          npx bombadil test http://localhost:4173 \
            --headless \
            --no-sandbox \
            --exit-on-violation \
            --time-limit "$BOMBADIL_TIME_LIMIT" \
            --output-path ./bombadil-results
        shell: bash

      - name: Upload Bombadil results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bombadil-results
          path: bombadil-results/

      - name: Run Flue Agent to Diagnose
        if: failure()
        id: flue
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          npx flue run analyze-violation --target node --id ci-bombadil-$GITHUB_RUN_ID > flue-output.txt 2>&1
          awk '/^\[flue\] Done\./{p=1; next} p' flue-output.txt > flue-result.json
          if [ -s flue-result.json ]; then
            echo "has_result=true" >> $GITHUB_OUTPUT
          else
            echo "has_result=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Build PR Comment
        if: failure()
        id: comment
        run: |
          if [ "${{ steps.flue.outputs.has_result }}" = "true" ] && [ -f flue-result.json ]; then
            FILE=$(jq -r '.diagnosis.file' flue-result.json)
            LINE=$(jq -r '.diagnosis.line' flue-result.json)
            FUNC=$(jq -r '.diagnosis.primaryFunc' flue-result.json)
            ERROR_TYPE=$(jq -r '.diagnosis.errorType' flue-result.json)
            ERROR_MSG=$(jq -r '.diagnosis.errorMessage' flue-result.json)
            EXPLANATION=$(jq -r '.fix.explanation' flue-result.json)
            OLD_CODE=$(jq -r '.fix.oldString' flue-result.json)
            NEW_CODE=$(jq -r '.fix.newString' flue-result.json)

            # Format diff with proper +/- line prefixes
            DIFF_OLD=$(printf '%s' "$OLD_CODE" | sed 's/^/- /')
            DIFF_NEW=$(printf '%s' "$NEW_CODE" | sed 's/^/+ /')

            cat > comment.md << EOF
          ## 🐛 Bombadil Fuzzy Test Failure

          Bombadil detected property violations during fuzzy testing.

          ### Diagnosis

          | | |
          |---|---|
          | **File** | \`$FILE\` |
          | **Line** | \`$LINE\` |
          | **Function** | \`$FUNC\` |

          **Error:** $ERROR_TYPE: \`$ERROR_MSG\`

          ### Proposed Fix

          \`\`\`diff
          $DIFF_OLD
          $DIFF_NEW
          \`\`\`

          **Explanation:** $EXPLANATION

          ### Action Sequence

          See the uploaded artifact \`bombadil-results\` for the full trace, screenshots, and state transitions.

          You can inspect locally with:
          \`\`\`bash
          npx bombadil inspect bombadil-results
          \`\`\`
          EOF
          else
            cat > comment.md << EOF
          ## 🐛 Bombadil Fuzzy Test Failure

          Bombadil detected property violations during fuzzy testing.

          ### Violations

          See the uploaded artifact \`bombadil-results\` for the full trace, screenshots, and state transitions.

          You can inspect locally with:
          \`\`\`bash
          npx bombadil inspect bombadil-results
          \`\`\`
          EOF
          fi
        shell: bash

      - name: Post PR Comment
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md
        shell: bash
